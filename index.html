<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Creator Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
            <h2 id="month-year-display"></h2>
            <button id="next-month"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <div class="calendar-days" id="calendar-days"></div>
    </div>

    <div class="modal" id="task-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h3 id="modal-date-title">Manage Tasks</h3>
            
            <div class="task-options">
                <label class="task-item">
                    <input type="checkbox" id="task-reel">
                    <span class="icon-label"><i class="fab fa-instagram reel-icon"></i> Instagram Reel / Short</span>
                </label>
                <label class="task-item">
                    <input type="checkbox" id="task-video">
                    <span class="icon-label"><i class="fab fa-youtube video-icon"></i> Long-form Video</span>
                </label>
                <label class="task-item">
                    <input type="checkbox" id="task-podcast">
                    <span class="icon-label"><i class="fas fa-microphone podcast-icon"></i> Podcast Episode</span>
                </label>
            </div>
            <button id="save-tasks-btn">Save Planner</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
